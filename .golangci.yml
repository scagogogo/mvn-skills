run:
  timeout: 5m
  go: '1.21'

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck

linters-settings:
  errcheck:
    # Exclude common cases where error return is not checked
    exclude-functions:
      - fmt.Fprintf
      - fmt.Fprintln
      - fmt.Fprint
      - fmt.Printf
      - fmt.Println
      - fmt.Sprintf
      - (io.Writer).Write

issues:
  # Don't flag errcheck issues in test files
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - path: examples/
      linters:
        - errcheck
  # Don't flag unused warnings for test files
  max-issues-per-linter: 50
  max-same-issues: 10
